<!doctype html>
<html lang="en" class="bg-dark-bg text-text-light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tenspick maas logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>TENSPICK MAAS | Marketing That Works While You Build Your Business</title>
    <meta name="title" content="TENSPICK MAAS | Marketing That Works While You Build Your Business" />
    <meta name="description" content="TENSPICK MAAS is a Marketing-As-A-Service platform providing branding, SEO, performance marketing, development, and AI automation under one subscription." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://maas.tenspick.com/" />
    <meta property="og:title" content="TENSPICK MAAS | Marketing That Works While You Build Your Business" />
    <meta property="og:description" content="Get access to a complete marketing department on demand under one subscription. Strategists, developers, and AI automation experts at your disposal." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Pacifico&family=Great+Vibes&display=swap" rel="stylesheet">
  </head>
  <body class="bg-white antialiased">
    <div id="root"></div>
    <noscript>
      <p style="padding:2rem;font-family:system-ui,sans-serif;color:#0F172A;">
        JavaScript is required. Run <strong>npm run dev</strong> and open
        <a href="http://localhost:5173/">http://localhost:5173/</a> — do not open this file directly.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && !root.hasChildNodes()) {
            root.innerHTML =
              '<div style="padding:2rem;max-width:32rem;font-family:system-ui,sans-serif;color:#0F172A;line-height:1.6">' +
              '<h1 style="font-size:1.125rem;font-weight:700;margin:0 0 0.75rem">App did not load</h1>' +
              '<p style="margin:0 0 0.75rem;color:#475569">This project must be served by Vite. From the project folder run:</p>' +
              '<pre style="background:#F1F5F9;padding:0.75rem;border-radius:0.5rem;font-size:0.875rem;margin:0 0 0.75rem">npm run dev</pre>' +
              '<p style="margin:0;color:#475569">Then open <a href="http://localhost:5173/" style="color:#2563EB">http://localhost:5173/</a>. Opening <code>index.html</code> directly will show a blank page.</p>' +
              '</div>';
          }
        }, 2500);
      });
    </script>
  </body>
</html>
